name: promo_app
description: Application mobile de gestion des promotions
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Networking
  dio: ^5.4.0
  http: ^1.1.0
  json_annotation: ^4.8.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  intl: ^0.18.1
  
  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.5

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
  # Désactiver le recadrage pour voir l'image complète
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFC00"
  image: assets/icon/app_icon.png
  android: true
  ios: false
  android_12:
    color: "#FFFC00"
    image: assets/icon/app_icon.png
  fullscreen: true
